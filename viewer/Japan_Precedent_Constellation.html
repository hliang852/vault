<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Precedent Constellation — Japan Special Situations</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root{
    --bg: #10151c;
    --panel: #171f2b;
    --panel-2: #1d2635;
    --border: #2b3549;
    --ink: #e9e3d3;
    --ink-dim: #97a2b5;
    --ink-faint: #5c6779;
    --gold: #c9a227;
    --gold-dim: #7d6a2e;
    --danger: #b0654a;
    --serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "IBM Plex Mono", Menlo, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --c-activist: #7fa37a;
    --c-takeprivate: #c1704a;
    --c-crossborder: #5b84a6;
    --c-parentsub: #9678a8;
    --c-contested: #c2984b;
    --c-strategic: #4e9490;
    --c-other: #7a8291;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink); font-family:var(--sans); overflow:hidden; }
  #app{ display:flex; flex-direction:column; height:100vh; }

  /* ---- header ---- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px 12px 22px; border-bottom:1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    flex-shrink:0; gap:20px; flex-wrap:wrap;
  }
  .brand{ display:flex; flex-direction:column; gap:2px; }
  .eyebrow{ font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
  h1{ font-family:var(--serif); font-weight:600; font-size:22px; margin:0; color:var(--ink); letter-spacing:.01em; }
  .subtitle{ font-size:11.5px; color:var(--ink-faint); font-family:var(--mono); }

  .search-wrap{ position:relative; }
  #search{
    background:var(--panel-2); border:1px solid var(--border); color:var(--ink);
    padding:8px 12px 8px 30px; border-radius:6px; font-family:var(--sans); font-size:13px; width:230px;
    outline:none;
  }
  #search:focus{ border-color:var(--gold-dim); }
  .search-wrap::before{
    content:"⌕"; position:absolute; left:10px; top:50%; transform:translateY(-50%);
    color:var(--ink-faint); font-size:14px;
  }

  .mode-toggle{ display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; font-family:var(--mono); font-size:11px; }
  .mode-toggle button{
    background:var(--panel); color:var(--ink-dim); border:none; padding:8px 14px; cursor:pointer;
    letter-spacing:.05em; text-transform:uppercase;
  }
  .mode-toggle button.active{ background:var(--gold); color:#181207; font-weight:600; }

  /* ---- filter bar ---- */
  #filterbar{
    display:flex; gap:8px; padding:10px 22px; border-bottom:1px solid var(--border);
    flex-wrap:wrap; align-items:center; flex-shrink:0; background:rgba(255,255,255,0.012);
  }
  .chip{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.03em; padding:5px 10px 5px 8px;
    border-radius:20px; border:1px solid var(--border); background:var(--panel-2); color:var(--ink-dim);
    cursor:pointer; display:flex; align-items:center; gap:6px; user-select:none; transition:opacity .15s;
  }
  .chip .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .chip.off{ opacity:.35; }
  .chip:hover{ border-color:var(--ink-faint); }
  .stat{ margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); }

  /* ---- main ---- */
  #main{ flex:1; display:flex; min-height:0; }
  #graph-wrap{ flex:1; position:relative; min-width:0; }
  svg{ width:100%; height:100%; display:block; cursor:grab; }
  svg:active{ cursor:grabbing; }

  .node circle{ stroke:var(--bg); stroke-width:1.5px; cursor:pointer; }
  .node text{ font-family:var(--mono); font-size:9px; fill:var(--ink-faint); pointer-events:none; }
  .node.dim{ opacity:.14; }
  .node.selected circle{ stroke:var(--gold); stroke-width:2.5px; }
  .link{ stroke:var(--gold-dim); stroke-opacity:.28; fill:none; }
  .link.hi{ stroke:var(--gold); stroke-opacity:.85; }
  .link.dim{ stroke-opacity:.04; }

  #hint{
    position:absolute; bottom:14px; left:16px; font-family:var(--mono); font-size:10.5px;
    color:var(--ink-faint); pointer-events:none; line-height:1.6;
  }

  /* ---- side panel ---- */
  #panel{
    width:380px; flex-shrink:0; background:var(--panel); border-left:1px solid var(--border);
    overflow-y:auto; padding:20px;
  }
  #panel::-webkit-scrollbar{ width:6px; }
  #panel::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }

  .empty-panel{ color:var(--ink-faint); font-size:13px; line-height:1.7; padding-top:40px; text-align:center; }
  .empty-panel .big{ font-size:32px; display:block; margin-bottom:10px; opacity:.5; }

  .case-id{ font-family:var(--mono); font-size:11px; color:var(--gold); letter-spacing:.08em; }
  .case-name{ font-family:var(--serif); font-size:19px; font-weight:600; margin:4px 0 2px 0; line-height:1.25; }
  .case-acquirer{ font-size:12px; color:var(--ink-dim); margin-bottom:10px; line-height:1.4; }
  .badge-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .badge{
    font-family:var(--mono); font-size:9.5px; padding:3px 8px; border-radius:4px; letter-spacing:.03em;
    border:1px solid var(--border); color:var(--ink-dim);
  }
  .brief-line{ font-size:12.5px; line-height:1.65; color:var(--ink); margin-bottom:8px; padding-left:12px; border-left:2px solid var(--border); }
  .brief-line.note{ color:var(--ink-dim); font-style:italic; }
  .section-label{
    font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.12em;
    color:var(--ink-faint); margin:20px 0 8px 0; padding-bottom:6px; border-bottom:1px solid var(--border);
  }
  .precedent-item{
    padding:9px 10px; margin-bottom:6px; background:var(--panel-2); border-radius:6px; cursor:pointer;
    border:1px solid transparent; transition:border-color .15s;
  }
  .precedent-item:hover{ border-color:var(--gold-dim); }
  .precedent-item .pid{ font-family:var(--mono); font-size:11px; color:var(--gold); }
  .precedent-item .pname{ font-size:12.5px; font-weight:600; margin:2px 0 4px 0; }
  .precedent-item .reason{ font-size:10.5px; color:var(--ink-faint); line-height:1.5; }
  .precedent-item .reason span{ display:inline-block; margin-right:3px; }
  .score-tag{ float:right; font-family:var(--mono); font-size:10px; color:var(--ink-faint); }

  /* ---- finder mode ---- */
  .finder-group{ margin-bottom:16px; }
  .finder-group label.title{
    display:block; font-family:var(--mono); font-size:10px; text-transform:uppercase;
    letter-spacing:.1em; color:var(--ink-faint); margin-bottom:7px;
  }
  select, .check-grid{ width:100%; }
  select{
    background:var(--panel-2); border:1px solid var(--border); color:var(--ink); padding:7px 8px;
    border-radius:5px; font-size:12.5px; font-family:var(--sans);
  }
  .check-grid{ display:flex; flex-wrap:wrap; gap:6px; }
  .check-pill{
    font-size:11px; padding:5px 9px; border-radius:5px; border:1px solid var(--border);
    background:var(--panel-2); color:var(--ink-dim); cursor:pointer; user-select:none;
  }
  .check-pill.on{ background:var(--gold); border-color:var(--gold); color:#181207; font-weight:600; }
  #find-btn{
    width:100%; padding:10px; background:var(--gold); color:#181207; border:none; border-radius:6px;
    font-family:var(--mono); font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700;
    cursor:pointer; margin-top:6px;
  }
  #find-btn:hover{ background:#dab233; }
  #reset-btn{
    width:100%; padding:8px; background:transparent; color:var(--ink-faint); border:1px solid var(--border);
    border-radius:6px; font-family:var(--mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase;
    cursor:pointer; margin-top:8px;
  }
  #results{ margin-top:16px; }
  .disclaimer{
    font-size:10.5px; color:var(--ink-faint); line-height:1.6; margin-top:18px; padding-top:14px;
    border-top:1px solid var(--border);
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <div class="eyebrow">Case-Based Precedent Map</div>
      <h1>Japan Special Situations, 2023–2026</h1>
      <div class="subtitle" id="subtitle-stat">— loading —</div>
    </div>
    <div style="display:flex; gap:14px; align-items:center;">
      <div class="mode-toggle">
        <button id="mode-explore" class="active">Explore</button>
        <button id="mode-find">Find Precedent</button>
      </div>
      <div class="search-wrap">
        <input id="search" placeholder="Search company or deal ID…" autocomplete="off">
      </div>
    </div>
  </header>

  <div id="filterbar"></div>

  <div id="main">
    <div id="graph-wrap">
      <svg id="svg"></svg>
      <div id="hint">Drag to reposition · Scroll to zoom · Click a node for its case brief</div>
    </div>
    <div id="panel"></div>
  </div>
</div>

0.5, "timeline_post_fiea_2026_amendment": 0.1, "has_dual_antitrust_review": 0.5, "timeline_post_2023_reforms": 0.1}, "activist_match": 2.5}};

const CATEGORY_COLORS = {
  'Activist campaign': 'var(--c-activist)',
  'Take-private / MBO': 'var(--c-takeprivate)',
  'Cross-border outbound': 'var(--c-crossborder)',
  'Parent-subsidiary / carve-out': 'var(--c-parentsub)',
  'Contested / hostile bid': 'var(--c-contested)',
  'Strategic TOB': 'var(--c-strategic)',
  'Other': 'var(--c-other)'
};
function resolveColor(v){
  const el = document.createElement('div');
  el.style.color = v; document.body.appendChild(el);
  const c = getComputedStyle(el).color; document.body.removeChild(el);
  return c;
}
const RESOLVED_COLORS = {};
Object.keys(CATEGORY_COLORS).forEach(k => RESOLVED_COLORS[k] = resolveColor(CATEGORY_COLORS[k]));

const nodesById = {};
DATA.nodes.forEach(n => nodesById[n.id] = n);

document.getElementById('subtitle-stat').textContent =
  `${DATA.nodes.length} landmark situations · ${DATA.edges.length} precedent links`;

// ---------------- filter bar ----------------
const activeCats = new Set(Object.keys(CATEGORY_COLORS));
const filterbar = document.getElementById('filterbar');
Object.keys(CATEGORY_COLORS).forEach(cat => {
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.innerHTML = `<span class="dot" style="background:${RESOLVED_COLORS[cat]}"></span>${cat}`;
  chip.onclick = () => {
    if (activeCats.has(cat)) { activeCats.delete(cat); chip.classList.add('off'); }
    else { activeCats.add(cat); chip.classList.remove('off'); }
    applyFilter();
  };
  filterbar.appendChild(chip);
});
const statSpan = document.createElement('div');
statSpan.className = 'stat';
statSpan.textContent = 'colored by deal archetype';
filterbar.appendChild(statSpan);

// ---------------- graph ----------------
const svg = d3.select('#svg');
const g = svg.append('g');
svg.call(d3.zoom().scaleExtent([0.3, 4]).on('zoom', (ev) => g.attr('transform', ev.transform)));

let width, height;
function measure(){
  const wrap = document.getElementById('graph-wrap');
  width = wrap.clientWidth; height = wrap.clientHeight;
  svg.attr('viewBox', [0,0,width,height]);
}
measure();
window.addEventListener('resize', () => { measure(); sim.force('center', d3.forceCenter(width/2, height/2)); sim.alpha(0.3).restart(); });

const nodesData = DATA.nodes.map(n => Object.assign({}, n));
const linksData = DATA.edges.map(e => Object.assign({}, e));

const sizeScale = d3.scaleSqrt()
  .domain([0, d3.max(nodesData, d => d.deal_size_usd_mn || 500)])
  .range([5, 20]);

const sim = d3.forceSimulation(nodesData)
  .force('link', d3.forceLink(linksData).id(d => d.id).distance(d => 150 - Math.min(d.score, 12)*6).strength(0.35))
  .force('charge', d3.forceManyBody().strength(-160))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collide', d3.forceCollide(d => sizeScale(d.deal_size_usd_mn || 300) + 14));

const linkSel = g.append('g').selectAll('line')
  .data(linksData).join('line')
  .attr('class', 'link')
  .attr('stroke-width', d => 0.6 + Math.min(d.score, 14) / 6);

const nodeSel = g.append('g').selectAll('g.node')
  .data(nodesData).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (ev,d)=>{ if(!ev.active) sim.alphaTarget(0.25).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
    .on('end', (ev,d)=>{ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

nodeSel.append('circle')
  .attr('r', d => sizeScale(d.deal_size_usd_mn || 300))
  .attr('fill', d => RESOLVED_COLORS[d.category_group] || RESOLVED_COLORS['Other'])
  .attr('fill-opacity', 0.85);

nodeSel.append('text')
  .attr('dy', d => sizeScale(d.deal_size_usd_mn||300) + 11)
  .attr('text-anchor','middle')
  .text(d => d.short_name);

nodeSel.on('click', (ev,d) => selectNode(d.id));
nodeSel.on('mouseenter', (ev,d) => { if(!selectedId) highlightNeighbors(d.id); });
nodeSel.on('mouseleave', () => { if(!selectedId) clearHighlight(); });

sim.on('tick', () => {
  linkSel.attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
         .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
  nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

let selectedId = null;

function neighborsOf(id){
  const set = new Set();
  linksData.forEach(l => {
    const s = l.source.id||l.source, t = l.target.id||l.target;
    if (s===id) set.add(t); if (t===id) set.add(s);
  });
  return set;
}

function highlightNeighbors(id){
  const nb = neighborsOf(id); nb.add(id);
  nodeSel.classed('dim', d => !nb.has(d.id));
  linkSel.classed('hi', l => (l.source.id||l.source)===id || (l.target.id||l.target)===id)
         .classed('dim', l => !((l.source.id||l.source)===id || (l.target.id||l.target)===id));
}
function clearHighlight(){
  nodeSel.classed('dim', d => !activeCats.has(d.category_group));
  linkSel.classed('hi', false).classed('dim', false);
}

function applyFilter(){
  nodeSel.classed('dim', d => !activeCats.has(d.category_group));
  linkSel.classed('dim', l => {
    const s = nodesById[l.source.id||l.source], t = nodesById[l.target.id||l.target];
    return !(activeCats.has(s.category_group) && activeCats.has(t.category_group));
  });
}

function reasonChips(reasons){
  return reasons.map(r => `<span>· ${r}</span>`).join('<br>');
}

function selectNode(id){
  selectedId = id;
  highlightNeighbors(id);
  nodeSel.classed('selected', d => d.id===id);
  const d = nodesById[id];
  const related = linksData
    .filter(l => (l.source.id||l.source)===id || (l.target.id||l.target)===id)
    .map(l => {
      const otherId = (l.source.id||l.source)===id ? (l.target.id||l.target) : (l.source.id||l.source);
      return { id: otherId, score: l.score, reasons: l.reasons };
    })
    .sort((a,b) => b.score - a.score);

  const panel = document.getElementById('panel');
  panel.innerHTML = `
    <div class="case-id">${d.id} · ${d.year}</div>
    <div class="case-name">${d.name}</div>
    <div class="case-acquirer">${d.acquirer}</div>
    <div class="badge-row">
      <span class="badge" style="color:${RESOLVED_COLORS[d.category_group]}">${d.category_group}</span>
      <span class="badge">${d.industry_group}</span>
      <span class="badge">${d.outcome}</span>
      <span class="badge">${d.verification}</span>
    </div>
    ${d.brief.map((line,i) => `<div class="brief-line${i>=3?' note':''}">${line}</div>`).join('')}
    <div class="section-label">Closest precedents (${related.length})</div>
    <div id="related-list"></div>
  `;
  const list = document.getElementById('related-list');
  if (related.length === 0){
    list.innerHTML = `<div style="color:var(--ink-faint); font-size:12px;">No strong precedent link found above threshold — this case sits somewhat on its own in this dataset.</div>`;
  }
  related.forEach(r => {
    const other = nodesById[r.id];
    const item = document.createElement('div');
    item.className = 'precedent-item';
    item.innerHTML = `
      <span class="score-tag">match ${r.score.toFixed(1)}</span>
      <div class="pid">${r.id}</div>
      <div class="pname">${other.name}</div>
      <div class="reason">${reasonChips(r.reasons)}</div>
    `;
    item.onclick = () => selectNode(r.id);
    list.appendChild(item);
  });
}

document.getElementById('svg').addEventListener('click', (ev) => {
  if (ev.target.tagName === 'svg' || ev.target.tagName==='SVG'){
    selectedId = null; nodeSel.classed('selected', false); clearHighlight();
    renderEmptyPanel();
  }
});

function renderEmptyPanel(){
  document.getElementById('panel').innerHTML = `
    <div class="empty-panel">
      <span class="big">◆</span>
      Click any node to read its case brief and see the precedents it links to.<br><br>
      Node size = deal value · color = deal archetype · line thickness = strength of the precedent match.
    </div>`;
}
renderEmptyPanel();

// ---------------- search ----------------
document.getElementById('search').addEventListener('input', (ev) => {
  const q = ev.target.value.trim().toLowerCase();
  if (!q){ clearHighlight(); return; }
  nodeSel.classed('dim', d => !(d.id.toLowerCase().includes(q) || d.name.toLowerCase().includes(q) || d.acquirer.toLowerCase().includes(q)));
});

// ---------------- mode toggle: Explore vs Find Precedent ----------------
const modeExploreBtn = document.getElementById('mode-explore');
const modeFindBtn = document.getElementById('mode-find');
modeExploreBtn.onclick = () => { modeExploreBtn.classList.add('active'); modeFindBtn.classList.remove('active');
  document.getElementById('filterbar').style.display='flex'; document.getElementById('hint').style.display='block';
  renderEmptyPanel(); };
modeFindBtn.onclick = () => { modeFindBtn.classList.add('active'); modeExploreBtn.classList.remove('active');
  document.getElementById('filterbar').style.display='none'; document.getElementById('hint').style.display='none';
  renderFinder(); };

const CATS = [...new Set(DATA.nodes.map(n=>n.category_group))].sort();
const INDS = [...new Set(DATA.nodes.map(n=>n.industry_group))].sort();
const BOOL_OPTIONS = [
  ['structure_has_TOB','Tender offer (TOB)'],
  ['structure_has_MBO','MBO'],
  ['structure_has_merger','Merger'],
  ['structure_has_scheme','Scheme of arrangement'],
  ['has_activist_involvement','Activist involved'],
  ['acquirer_is_unlisted','Unlisted acquirer / PE sponsor'],
  ['has_CFIUS','CFIUS review'],
  ['has_METI','METI involvement'],
  ['has_FEFTA','FEFTA screening'],
  ['has_China_SAMR','China SAMR'],
  ['has_EU_regulator','EU regulator'],
  ['has_DOJ_FTC_HSR','US DOJ/FTC (HSR)'],
  ['has_FIRB','FIRB (Australia)'],
];
let query = { category_group:null, industry_group:null, competing_bid_flag:null, board_recommendation_code:null, bools:new Set() };

function renderFinder(){
  const panel = document.getElementById('panel');
  panel.innerHTML = `
    <div class="section-label" style="margin-top:0;">Describe the new deal</div>
    <div class="finder-group">
      <label class="title">Deal archetype</label>
      <select id="f-cat"><option value="">— any —</option>${CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    </div>
    <div class="finder-group">
      <label class="title">Industry</label>
      <select id="f-ind"><option value="">— any —</option>${INDS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    </div>
    <div class="finder-group">
      <label class="title">Competing bid expected?</label>
      <select id="f-comp"><option value="">— any —</option><option value="Yes">Yes</option><option value="No">No</option></select>
    </div>
    <div class="finder-group">
      <label class="title">Likely board posture</label>
      <select id="f-board"><option value="">— any —</option><option value="For">For</option><option value="Opposed">Opposed</option><option value="Mixed">Mixed</option><option value="Engaged">Engaged</option></select>
    </div>
    <div class="finder-group">
      <label class="title">Facts present (select all that apply)</label>
      <div class="check-grid" id="f-bools">
        ${BOOL_OPTIONS.map(([k,label]) => `<div class="check-pill" data-k="${k}">${label}</div>`).join('')}
      </div>
    </div>
    <button id="find-btn">Find comparable precedents</button>
    <button id="reset-btn">Reset</button>
    <div id="results"></div>
    <div class="disclaimer">This ranks the 62 cases by shared, nameable facts — it is a precedent index, not a prediction. Always verify against primary filings (EDINET / TDnet) before relying on any specific case detail.</div>
  `;
  document.getElementById('f-cat').onchange = e => query.category_group = e.target.value || null;
  document.getElementById('f-ind').onchange = e => query.industry_group = e.target.value || null;
  document.getElementById('f-comp').onchange = e => query.competing_bid_flag = e.target.value || null;
  document.getElementById('f-board').onchange = e => query.board_recommendation_code = e.target.value || null;
  document.querySelectorAll('.check-pill').forEach(pill => {
    pill.onclick = () => {
      const k = pill.dataset.k;
      if (query.bools.has(k)) { query.bools.delete(k); pill.classList.remove('on'); }
      else { query.bools.add(k); pill.classList.add('on'); }
    };
  });
  document.getElementById('find-btn').onclick = runFinder;
  document.getElementById('reset-btn').onclick = () => { query = { category_group:null, industry_group:null, competing_bid_flag:null, board_recommendation_code:null, bools:new Set() }; renderFinder(); };
}

function scoreAgainstQuery(node){
  const f = node.features;
  let score = 0; const reasons = [];
  const W = DATA.weights;
  if (query.category_group && f.category_group === query.category_group){ score += W.categorical.category_group; reasons.push(`Same archetype: ${f.category_group}`); }
  if (query.industry_group && f.industry_group === query.industry_group){ score += W.categorical.industry_group; reasons.push(`Same industry: ${f.industry_group}`); }
  if (query.competing_bid_flag && f.competing_bid_flag === query.competing_bid_flag){ score += W.categorical.competing_bid_flag; reasons.push(`Competing bid: ${f.competing_bid_flag}`); }
  if (query.board_recommendation_code && f.board_recommendation_code === query.board_recommendation_code){ score += W.categorical.board_recommendation_code; reasons.push(`Board posture: ${f.board_recommendation_code}`); }
  query.bools.forEach(k => {
    if (k === 'has_activist_involvement' ? f.has_activist_involvement : f[k]){
      const w = W.boolean[k] || 0.5;
      score += w;
      reasons.push(BOOL_OPTIONS.find(o=>o[0]===k)[1]);
    }
  });
  reasons.sort();
  return { score, reasons: reasons.slice(0,5) };
}

function runFinder(){
  const scored = DATA.nodes.map(n => {
    const { score, reasons } = scoreAgainstQuery(n);
    return { node:n, score, reasons };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score).slice(0,8);

  const results = document.getElementById('results');
  if (scored.length === 0){
    results.innerHTML = `<div style="color:var(--ink-faint); font-size:12px; margin-top:10px;">Select at least one fact above, then click "Find comparable precedents."</div>`;
    return;
  }
  results.innerHTML = `<div class="section-label" style="margin-top:6px;">Top matching precedents</div>`;
  scored.forEach(({node,score,reasons}) => {
    const item = document.createElement('div');
    item.className = 'precedent-item';
    item.innerHTML = `
      <span class="score-tag">match ${score.toFixed(1)}</span>
      <div class="pid">${node.id} · ${node.year}</div>
      <div class="pname">${node.name}</div>
      <div class="reason">${reasons.map(r=>`<span>· ${r}</span>`).join('<br>')}</div>
    `;
    item.onclick = () => { modeExploreBtn.click(); selectNode(node.id); };
    results.appendChild(item);
  });
}

applyFilter();
</script>
